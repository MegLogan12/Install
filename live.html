<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LOVING Dispatch</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f7fa;color:#0d2240}
.status{max-width:360px;padding:24px;text-align:center}
.status h1{font-size:20px;margin:0 0 8px}
.status p{font-size:14px;line-height:1.45;color:#526070}
.status a{color:#1565c0}
</style>
</head>
<body>
<div class="status">
  <h1>LOVING Dispatch</h1>
  <p id="msg">Loading field dispatch app...</p>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<script>
(async function(){
  var msg = document.getElementById('msg');
  async function fetchPayload(path){
    var res = await fetch(path, { cache: 'no-store' });
    if(!res.ok) throw new Error('Could not load ' + path);
    var text = await res.text();
    var match = text.match(/var payload = '([^']+)'/);
    if(!match) throw new Error('Payload not found in ' + path);
    return match[1];
  }
  function inflatePayload(payload){
    var binary = atob(payload);
    var bytes = Uint8Array.from(binary, function(c){ return c.charCodeAt(0); });
    return window.pako.ungzip(bytes, { to: 'string' });
  }
  try {
    if(!window.pako) throw new Error('Decoder library did not load.');
    var payload;
    try {
      payload = await fetchPayload('./working.html');
    } catch (firstError) {
      payload = await fetchPayload('./index.html');
    }
    var html = inflatePayload(payload);
    document.open();
    document.write(html);
    document.close();
  } catch (err) {
    msg.innerHTML = 'This link had trouble loading. Please refresh once. If it keeps happening, open <a href="./working.html">working.html</a>.';
    console.error(err);
  }
})();
</script>
</body>
</html>
