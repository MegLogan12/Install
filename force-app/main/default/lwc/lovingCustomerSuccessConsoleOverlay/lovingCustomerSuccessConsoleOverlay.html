<template>
    <div class="console-root">

        <!-- ── Top nav bar ──────────────────────────────────────────────── -->
        <div class="sf-top">
            <div class="sf-app">
                <div class="sf-app-icon">CS</div>
                Customer Success Console
            </div>
            <div class="sf-search">Search cases, builders, orders…</div>
            <div class="sf-icons">
                <div class="sf-ico">?</div>
                <div class="sf-ico">🔔</div>
                <div class="sf-avatar">ML</div>
            </div>
        </div>

        <!-- ── Tab ribbon ───────────────────────────────────────────────── -->
        <div class="sf-nav">
            <template for:each={computedTabs} for:item="tab">
                <button key={tab.id} class={tab.cls} data-tab={tab.id} onclick={handleTabClick}>
                    {tab.icon}&nbsp;{tab.label}
                    <template if:true={tab.showBadge}>
                        <span class={tab.badgeCls}>{tab.badgeCount}</span>
                    </template>
                </button>
            </template>
        </div>

        <!-- ── Tab panels ───────────────────────────────────────────────── -->
        <div class="sf-body">

            <!-- ══ HOME ═══════════════════════════════════════════════════ -->
            <template if:true={isHome}>
                <div class="layout">
                    <div class="layout-main">

                        <!-- KPI row -->
                        <div class="g6">
                            <div class="kpi ka">
                                <div class="kn">{kpiOpenCases}</div>
                                <div class="kl">Open Cases</div>
                            </div>
                            <div class="kpi kb">
                                <div class="kn">{kpiNewToday}</div>
                                <div class="kl">New Today</div>
                            </div>
                            <div class="kpi kr">
                                <div class="kn">{kpiOverdue}</div>
                                <div class="kl">7-Day Aged</div>
                            </div>
                            <div class="kpi korange">
                                <div class="kn">{kpiOpenWorkOrders}</div>
                                <div class="kl">Open Work Orders</div>
                            </div>
                            <div class="kpi kp">
                                <div class="kn">{kpiPendingApprovals}</div>
                                <div class="kl">Pending Approvals</div>
                            </div>
                            <div class="kpi kg">
                                <div class="kn">{kpiSiteVisitsWeek}</div>
                                <div class="kl">Site Visits (Wk)</div>
                            </div>
                        </div>

                        <!-- Urgent cases -->
                        <div class="card alert">
                            <div class="ch">
                                <div class="ci" style="background:#c23934">!</div>
                                <h3>Urgent Open Cases</h3>
                                <button class="ch-link" onclick={navigateToCases}>View All →</button>
                            </div>
                            <table class="tbl">
                                <thead>
                                    <tr>
                                        <th>Case #</th>
                                        <th>Subject</th>
                                        <th>Account</th>
                                        <th>Status</th>
                                        <th>Type</th>
                                        <th>Modified</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={urgentCases} for:item="c">
                                        <tr key={c.Id}>
                                            <td><button class="nl" data-id={c.Id} onclick={navigateToRecord}>{c.CaseNumber}</button></td>
                                            <td>{c.Subject}</td>
                                            <td>{c.accountName}</td>
                                            <td><span class={c.statusChipCls}>{c.Status}</span></td>
                                            <td>{c.Type}</td>
                                            <td>{c.modifiedLabel}</td>
                                        </tr>
                                    </template>
                                    <template if:true={noUrgentCases}>
                                        <tr><td colspan="6" class="empty-state">No High priority open cases — all clear ✓</td></tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>

                        <!-- Summary grid -->
                        <div class="g3">
                            <div class="card warn">
                                <div class="ch">
                                    <div class="ci" style="background:#fe9339">EP</div>
                                    <h3>EPO / PO Changes</h3>
                                    <button class="ch-link" data-tab="5" onclick={handleTabClick}>Open →</button>
                                </div>
                                <div style="padding:12px 14px;font-size:12px;color:#54698d">
                                    Review builder-requested changes requiring approval or scope update.
                                </div>
                            </div>
                            <div class="card info">
                                <div class="ch">
                                    <div class="ci" style="background:#0070d2">SV</div>
                                    <h3>Site Visits This Week</h3>
                                    <button class="ch-link" data-tab="4" onclick={handleTabClick}>Open →</button>
                                </div>
                                <div style="padding:12px 14px;font-size:24px;font-weight:500;color:#16325c">
                                    {kpiSiteVisitsWeek}
                                </div>
                            </div>
                            <div class="card ok">
                                <div class="ch">
                                    <div class="ci" style="background:#04844b">CQ</div>
                                    <h3>Closeout Queue</h3>
                                    <button class="ch-link" data-tab="8" onclick={handleTabClick}>Open →</button>
                                </div>
                                <div style="padding:12px 14px;font-size:12px;color:#54698d">
                                    Completed Work Orders pending CS review, invoice, or customer follow-up.
                                </div>
                            </div>
                        </div>

                    </div>

                    <!-- Right rail -->
                    <div class="layout-rail">
                        <!-- Agentforce Assist -->
                        <div class="card">
                            <div class="ch">
                                <div class="ci" style="background:#534ab7">AI</div>
                                <h3>Agentforce Assist</h3>
                            </div>
                            <div class="agent-card">
                                <div class="agent-title">AI Suggestions</div>
                                <div class="agent-copy">Agentforce Assist surfaces knowledge, suggests next steps, and can draft responses. Enable via Setup → Einstein → Agent Studio to activate live suggestions here.</div>
                                <textarea class="agent-prompt" rows="2" placeholder="Ask Agentforce…" onchange={handleAgentforceInput}></textarea>
                            </div>
                        </div>
                        <!-- SLA -->
                        <div class="card">
                            <div class="ch">
                                <div class="ci" style="background:#0070d2">SLA</div>
                                <h3>SLA &amp; Entitlements</h3>
                            </div>
                            <div class="setup-state">
                                <strong>Open a Case to view SLA</strong>
                                Entitlement milestones and breach warnings will appear here once a Case is selected.
                            </div>
                        </div>
                        <!-- Tools -->
                        <div class="card last">
                            <div class="ch">
                                <div class="ci" style="background:#04844b">SC</div>
                                <h3>Service Cloud Tools</h3>
                            </div>
                            <div class="qa-list">
                                <button class="qa-item" onclick={navigateToNewCase}>+ New Case</button>
                                <button class="qa-item" onclick={navigateToNewWorkOrder}>+ New Work Order</button>
                                <button class="qa-item" onclick={navigateToNewServiceAppointment}>+ New Site Visit</button>
                                <button class="qa-item" data-tab="9" onclick={handleTabClick}>📖 Knowledge Base</button>
                                <button class="qa-item" data-tab="11" onclick={handleTabClick}>👍 Approvals Queue</button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ══ OMNI INBOX ══════════════════════════════════════════════ -->
            <template if:true={isOmni}>
                <div class="layout">
                    <div class="layout-main">
                        <div class="card">
                            <div class="ch">
                                <div class="ci" style="background:#fe9339">📥</div>
                                <h3>Routed Work</h3>
                                <button class="sf-btn primary" onclick={navigateToNewCase}>+ New Case</button>
                            </div>
                            <template if:true={noOmniWork}>
                                <div class="setup-state">
                                    <strong>Omni-Channel Setup Required</strong>
                                    No routed work found. Omni-Channel must be enabled and the agent must be available. Go to Setup → Omni-Channel Settings to configure. Once enabled, routed Cases, Chats, and Calls will appear here automatically.
                                    <br/><br/>
                                    <em>Fallback: use the Cases tab to manage work directly.</em>
                                </div>
                            </template>
                            <template if:false={noOmniWork}>
                                <template for:each={omniWork} for:item="work">
                                    <div key={work.Id} class="inbox-row unread" data-id={work.WorkItemId} onclick={navigateToRecord}>
                                        <div class="inbox-icon" style="background:#fe9339">W</div>
                                        <div class="inbox-content">
                                            <div class="inbox-meta">
                                                <span class="inbox-from">Routed Work Item</span>
                                                <span class="chip ca">{work.Status}</span>
                                            </div>
                                            <div class="inbox-subject">{work.WorkItemId}</div>
                                            <div class="inbox-preview">Click to open routed record</div>
                                        </div>
                                    </div>
                                </template>
                            </template>
                        </div>

                        <div class="ab ab-b">
                            <strong>Omni-Channel:</strong> When enabled, new Cases, Email-to-Case, Web-to-Case, Chats, and Calls are pushed here automatically. Agents must set status to Available in the Omni-Channel utility bar widget.
                        </div>
                    </div>

                    <!-- Right rail -->
                    <div class="layout-rail">
                        <div class="card">
                            <div class="ch"><div class="ci" style="background:#534ab7">AI</div><h3>Agentforce Assist</h3></div>
                            <div class="agent-card"><div class="agent-title">AI Suggestions</div><div class="agent-copy">Enable Agentforce in Setup → Einstein → Agent Studio for live AI coaching and response drafting in the Omni Inbox.</div></div>
                        </div>
                        <div class="card">
                            <div class="ch"><div class="ci" style="background:#0070d2">CH</div><h3>Omni-Channel Status</h3></div>
                            <div style="padding:12px 14px;font-size:12px;color:#54698d;line-height:1.6">
                                Set your availability in the Omni-Channel widget in the utility bar. Your current queue assignments determine which work is routed here.
                            </div>
                        </div>
                        <div class="card last">
                            <div class="ch"><div class="ci" style="background:#04844b">SC</div><h3>Quick Actions</h3></div>
                            <div class="qa-list">
                                <button class="qa-item" onclick={navigateToNewCase}>+ New Case</button>
                                <button class="qa-item" data-tab="2" onclick={handleTabClick}>📋 All Cases</button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ══ CASES ═══════════════════════════════════════════════════ -->
            <template if:true={isCases}>
                <div class="layout">
                    <div class="layout-main">
                        <div class="card">
                            <div class="list-toolbar">
                                <template for:each={caseFilterChips} for:item="chip">
                                    <button key={chip.label} class={chip.cls} data-type={chip.label} onclick={handleCaseFilterClick}>{chip.label}</button>
                                </template>
                                <button class="sf-btn primary" style="margin-left:auto" onclick={navigateToNewCase}>+ New Case</button>
                            </div>
                            <template if:true={casesError}>
                                <div class="error-state">{casesError}</div>
                            </template>
                            <table class="tbl">
                                <thead>
                                    <tr>
                                        <th>Case #</th>
                                        <th>Subject</th>
                                        <th>Account</th>
                                        <th>Contact</th>
                                        <th>Status</th>
                                        <th>Priority</th>
                                        <th>Type</th>
                                        <th>Modified</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={cases} for:item="c">
                                        <tr key={c.Id}>
                                            <td><button class="nl" data-id={c.Id} onclick={navigateToRecord}>{c.CaseNumber}</button></td>
                                            <td>{c.Subject}</td>
                                            <td>{c.accountName}</td>
                                            <td>{c.contactName}</td>
                                            <td><span class={c.statusChipCls}>{c.Status}</span></td>
                                            <td><span class={c.priorityCls}>{c.Priority}</span></td>
                                            <td>{c.Type}</td>
                                            <td>{c.modifiedLabel}</td>
                                        </tr>
                                    </template>
                                    <template if:true={noCases}>
                                        <tr><td colspan="8" class="empty-state">No open cases match this filter.</td></tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Right rail -->
                    <div class="layout-rail">
                        <div class="card">
                            <div class="ch"><div class="ci" style="background:#534ab7">AI</div><h3>Agentforce Assist</h3></div>
                            <div class="agent-card"><div class="agent-title">Case Intelligence</div><div class="agent-copy">Select a Case record to activate AI-suggested next steps, knowledge matches, and draft responses.</div></div>
                        </div>
                        <div class="card">
                            <div class="ch"><div class="ci" style="background:#0070d2">SLA</div><h3>SLA &amp; Entitlements</h3></div>
                            <div class="setup-state"><strong>Open a Case to view SLA</strong>Milestones and breach timers appear on the Case record Entitlement panel.</div>
                        </div>
                        <div class="card last">
                            <div class="ch"><div class="ci" style="background:#04844b">SC</div><h3>Actions</h3></div>
                            <div class="qa-list">
                                <button class="qa-item" onclick={navigateToNewCase}>+ New Case</button>
                                <button class="qa-item" onclick={navigateToCases}>↗ Open Cases List View</button>
                                <button class="qa-item" data-tab="11" onclick={handleTabClick}>👍 Approvals</button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ══ BUILDER 360 ═════════════════════════════════════════════ -->
            <template if:true={isBuilder360}>
                <div class="layout">
                    <div class="layout-main">

                        <!-- Builder selector -->
                        <div class="card">
                            <div class="ch">
                                <div class="ci" style="background:#16325c">B</div>
                                <h3>Select Builder Account</h3>
                            </div>
                            <div style="padding:12px 14px">
                                <select class="list-search" style="max-width:400px" onchange={handleBuilderDropdown}>
                                    <option value="">— Choose a builder —</option>
                                    <template for:each={builderAccounts} for:item="acct">
                                        <option key={acct.Id} value={acct.Id}>{acct.Name}</option>
                                    </template>
                                </select>
                                <template if:true={hasSelectedBuilder}>
                                    <button class="sf-btn" style="margin-left:8px" data-id={selectedBuilderId} onclick={navigateToRecord}>Open Account ↗</button>
                                </template>
                            </div>
                        </div>

                        <!-- Builder KPIs -->
                        <template if:true={hasSelectedBuilder}>
                            <div class="g3">
                                <div class="kpi ka">
                                    <div class="kn">{builderOpenCases}</div>
                                    <div class="kl">Open Cases</div>
                                </div>
                                <div class="kpi korange">
                                    <div class="kn">{builderOpenWOs}</div>
                                    <div class="kl">Open Work Orders</div>
                                </div>
                                <div class="kpi kb">
                                    <div class="kn">{builderOpenQuotes}</div>
                                    <div class="kl">Open Quotes</div>
                                </div>
                            </div>
                        </template>

                        <!-- Cases for selected builder -->
                        <div class="card">
                            <div class="ch">
                                <div class="ci" style="background:#c23934">📋</div>
                                <h3>Open Cases</h3>
                            </div>
                            <template if:true={noUrgentCases}>
                                <div class="empty-state">Select a builder above to see their open cases.</div>
                            </template>
                            <table class="tbl">
                                <thead><tr><th>Case #</th><th>Subject</th><th>Status</th><th>Type</th><th>Modified</th></tr></thead>
                                <tbody>
                                    <template for:each={urgentCases} for:item="c">
                                        <tr key={c.Id}>
                                            <td><button class="nl" data-id={c.Id} onclick={navigateToRecord}>{c.CaseNumber}</button></td>
                                            <td>{c.Subject}</td>
                                            <td><span class={c.statusChipCls}>{c.Status}</span></td>
                                            <td>{c.Type}</td>
                                            <td>{c.modifiedLabel}</td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>

                        <!-- Work orders -->
                        <div class="card">
                            <div class="ch">
                                <div class="ci" style="background:#0070d2">WO</div>
                                <h3>Work Orders</h3>
                                <button class="sf-btn" onclick={navigateToNewWorkOrder}>+ New WO</button>
                            </div>
                            <table class="tbl">
                                <thead><tr><th>WO #</th><th>Subject</th><th>Status</th><th>Start</th></tr></thead>
                                <tbody>
                                    <template for:each={workOrders} for:item="wo">
                                        <tr key={wo.Id}>
                                            <td><button class="nl" data-id={wo.Id} onclick={navigateToRecord}>{wo.WorkOrderNumber}</button></td>
                                            <td>{wo.Subject}</td>
                                            <td>{wo.Status}</td>
                                            <td>{wo.StartDate}</td>
                                        </tr>
                                    </template>
                                    <template if:true={noWorkOrders}>
                                        <tr><td colspan="4" class="empty-state">No open work orders.</td></tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Right rail -->
                    <div class="layout-rail">
                        <div class="card">
                            <div class="ch"><div class="ci" style="background:#534ab7">AI</div><h3>Agentforce Assist</h3></div>
                            <div class="agent-card"><div class="agent-title">Builder Intelligence</div><div class="agent-copy">Ask Agentforce for builder history, open issues, and recommended next steps.</div></div>
                        </div>
                        <div class="card last">
                            <div class="ch"><div class="ci" style="background:#04844b">SC</div><h3>Quick Actions</h3></div>
                            <div class="qa-list">
                                <button class="qa-item" onclick={navigateToNewCase}>+ New Case</button>
                                <button class="qa-item" onclick={navigateToNewWorkOrder}>+ New Work Order</button>
                                <button class="qa-item" onclick={navigateToNewQuote}>+ New Quote</button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ══ SITE VISITS ════════════════════════════════════════════ -->
            <template if:true={isSiteVisits}>
                <div class="layout">
                    <div class="layout-main">
                        <div class="card">
                            <div class="ch">
                                <div class="ci" style="background:#0070d2">SA</div>
                                <h3>Service Appointments</h3>
                                <button class="sf-btn primary" onclick={navigateToNewServiceAppointment}>+ Create Site Visit</button>
                            </div>
                            <table class="tbl">
                                <thead><tr><th>SA #</th><th>Subject</th><th>Account</th><th>Status</th><th>Scheduled Start</th><th>Scheduled End</th></tr></thead>
                                <tbody>
                                    <template for:each={serviceAppointments} for:item="sa">
                                        <tr key={sa.Id}>
                                            <td><button class="nl" data-id={sa.Id} onclick={navigateToRecord}>{sa.AppointmentNumber}</button></td>
                                            <td>{sa.Subject}</td>
                                            <td>{sa.Account.Name}</td>
                                            <td><span class="chip cgr">{sa.Status}</span></td>
                                            <td>{sa.SchedStartTime}</td>
                                            <td>{sa.SchedEndTime}</td>
                                        </tr>
                                    </template>
                                    <template if:true={noServiceAppts}>
                                        <tr><td colspan="6" class="empty-state">No upcoming site visits scheduled. Click "+ Create Site Visit" to schedule one.</td></tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>

                        <div class="card">
                            <div class="ch">
                                <div class="ci" style="background:#fe9339">WO</div>
                                <h3>Related Work Orders</h3>
                                <button class="sf-btn" onclick={navigateToNewWorkOrder}>+ New Work Order</button>
                            </div>
                            <table class="tbl">
                                <thead><tr><th>WO #</th><th>Subject</th><th>Status</th><th>Account</th><th>Start</th></tr></thead>
                                <tbody>
                                    <template for:each={workOrders} for:item="wo">
                                        <tr key={wo.Id}>
                                            <td><button class="nl" data-id={wo.Id} onclick={navigateToRecord}>{wo.WorkOrderNumber}</button></td>
                                            <td>{wo.Subject}</td>
                                            <td>{wo.Status}</td>
                                            <td>{wo.Account.Name}</td>
                                            <td>{wo.StartDate}</td>
                                        </tr>
                                    </template>
                                    <template if:true={noWorkOrders}>
                                        <tr><td colspan="5" class="empty-state">No open work orders.</td></tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Right rail -->
                    <div class="layout-rail">
                        <div class="card">
                            <div class="ch"><div class="ci" style="background:#534ab7">AI</div><h3>Agentforce Assist</h3></div>
                            <div class="agent-card"><div class="agent-title">Field Scheduling AI</div><div class="agent-copy">Agentforce can suggest optimal appointment windows and flag scheduling conflicts when enabled.</div></div>
                        </div>
                        <div class="card last">
                            <div class="ch"><div class="ci" style="background:#04844b">SC</div><h3>Quick Actions</h3></div>
                            <div class="qa-list">
                                <button class="qa-item" onclick={navigateToNewServiceAppointment}>+ Create Site Visit</button>
                                <button class="qa-item" onclick={navigateToNewWorkOrder}>+ New Work Order</button>
                                <button class="qa-item" onclick={navigateToNewCase}>+ New Case</button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ══ EPO / PO CHANGES ════════════════════════════════════════ -->
            <template if:true={isEpo}>
                <div class="layout">
                    <div class="layout-main">
                        <div class="ab ab-a">
                            <strong>EPO / PO Changes</strong> Cases with Type = "EPO" appear here. Each EPO may require builder approval, scope update, or child Work Order creation. Review and action before advancing.
                        </div>
                        <div class="card">
                            <div class="ch">
                                <div class="ci" style="background:#fe9339">EP</div>
                                <h3>EPO / PO Change Cases</h3>
                                <button class="sf-btn primary" onclick={navigateToNewCase}>+ New EPO Case</button>
                            </div>
                            <table class="tbl">
                                <thead>
                                    <tr>
                                        <th>Case #</th>
                                        <th>Subject</th>
                                        <th>Account</th>
                                        <th>Status</th>
                                        <th>Priority</th>
                                        <th>Modified</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={epoCases} for:item="c">
                                        <tr key={c.Id}>
                                            <td><button class="nl" data-id={c.Id} onclick={navigateToRecord}>{c.CaseNumber}</button></td>
                                            <td>{c.Subject}</td>
                                            <td>{c.accountName}</td>
                                            <td><span class={c.statusChipCls}>{c.Status}</span></td>
                                            <td><span class={c.priorityCls}>{c.Priority}</span></td>
                                            <td>{c.modifiedLabel}</td>
                                            <td>
                                                <div style="display:flex;gap:4px">
                                                    <button class="sf-btn" data-id={c.Id} onclick={handleSendReminder}>Send Reminder</button>
                                                    <button class="sf-btn danger" data-id={c.Id} onclick={handleEscalateCase}>Escalate</button>
                                                </div>
                                            </td>
                                        </tr>
                                    </template>
                                    <template if:true={noEpoCases}>
                                        <tr><td colspan="7" class="empty-state">No open EPO / PO Change cases. Cases with Type = "EPO" will appear here.</td></tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Right rail -->
                    <div class="layout-rail">
                        <div class="card">
                            <div class="ch"><div class="ci" style="background:#534ab7">AI</div><h3>Agentforce Assist</h3></div>
                            <div class="agent-card"><div class="agent-title">EPO Review AI</div><div class="agent-copy">Agentforce can summarize EPO scope, flag pricing conflicts, and draft approval notes when enabled.</div></div>
                        </div>
                        <div class="card last">
                            <div class="ch"><div class="ci" style="background:#04844b">SC</div><h3>Quick Actions</h3></div>
                            <div class="qa-list">
                                <button class="qa-item" onclick={navigateToNewCase}>+ New EPO Case</button>
                                <button class="qa-item" data-tab="11" onclick={handleTabClick}>👍 Go to Approvals</button>
                                <button class="qa-item" onclick={navigateToNewWorkOrder}>+ Child Work Order</button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ══ WARRANTY ════════════════════════════════════════════════ -->
            <template if:true={isWarranty}>
                <div class="layout">
                    <div class="layout-main">
